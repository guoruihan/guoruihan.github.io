short_bio: >-

  <p>
    Hi! I am Ruihan Guo, a first-year CS Ph.D. student at the <a href="https://illinois.edu/" target="_blank">University of Illinois Urbana-Champaign</a>, advised by <a href="https://siebelschool.illinois.edu/about/people/faculty/geliu" target="_blank">Prof. Ge Liu</a>.
  </p>
  <p>
    My research interests lie in generative modeling and controllable generation, with a focus on their applications to molecular design. I am also broadly interested in AI-driven drug discovery and biomolecular design, including antibody design and protein engineering.
  </p>
  <p>
    Before joining UIUC, I spent three years at <a href="https://www.helixon.com/" target="_blank">Helixon</a>, an AI-biotech startup, where I worked with <a href="https://majianzhu.com/" target="_blank">Jianzhu Ma</a> and <a href="https://jianpeng.web.engr.illinois.edu/" target="_blank">Jian Peng</a>.
  </p>

